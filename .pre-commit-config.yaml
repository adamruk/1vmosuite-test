default_install_hook_types: [pre-commit, commit-msg, pre-push]
default_stages: [pre-commit]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.10.0
    hooks:
      - id: commitizen
        stages: [commit-msg]

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.41.0
    hooks:
      - id: markdownlint
        args: ["--config", ".markdownlint.yaml"]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.2
    hooks:
      - id: mypy
        # mypy reads its config from pyproject.toml [tool.mypy]
        # (strict surface: scripts/ + tools/check_encoder_schema.py).
        # Cache dir override avoids sandbox virtiofs I/O errors during
        # local pre-commit runs; harmless on developer machines.
        args: ["--cache-dir=/tmp/mypy_cache"]
        files: ^(scripts/|tools/check_encoder_schema\.py$)
        additional_dependencies: ["pydantic>=2.0,<3"]

  - repo: local
    hooks:
      - id: adr-lint
        name: ADR header & date consistency
        entry: python scripts/adr_lint.py
        language: system
        files: ^docs/decisions/ADR-.*\.md$
      - id: check-changelog
        name: CHANGELOG entry required for source changes
        entry: python scripts/check_changelog.py
        language: system
        stages: [commit-msg]
        pass_filenames: false
        always_run: true
      - id: check-adr-references
        name: ADR references resolve to existing files
        entry: python scripts/check_adr_references.py
        language: system
        pass_filenames: false
        always_run: true
      - id: check-default-drift
        name: AppDefaults is the single source of truth for the 6 defaults
        entry: python scripts/check_default_drift.py
        language: system
        pass_filenames: false
        always_run: true
      - id: check-repo-consistency
        name: Required files / dirs / PyQt5 + qt_compat absence
        entry: python scripts/check_repo_consistency.py
        language: system
        pass_filenames: false
        always_run: true
      # Pre-push gate: mirrors CI (.github/workflows/ci.yml) so a broken push is
      # blocked locally even after the repo goes private (branch protection does
      # not enforce on a private free plan). Runs once per push, not per file.
      - id: ruff-push
        name: "ruff (pre-push)"
        entry: ruff check .
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: smoke-push
        name: "smoke tests (pre-push, headless)"
        entry: bash -c 'QT_QPA_PLATFORM=offscreen python -m pytest tests/smoke -q'
        language: system
        pass_filenames: false
        stages: [pre-push]
