name: CI

# Guards the default branch against silent drift (see the phase4 reconcile):
# every push to main and every PR runs the ruff lint gate + the headless
# smoke suite. The runner has NO NVIDIA GPU and NO display, so GPU/NVENC
# tests run against their mocked probes and ffmpeg-dependent tests skip
# gracefully via shutil.which (see tests/smoke/*).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          # ffmpeg: real binary for the scoring/runner smoke tests (they
          #   skip when it is absent, but CI exercises the real path).
          # libegl1: PySide6 needs libEGL.so.1 to load even the offscreen
          #   QPA plugin on a headless runner.
          sudo apt-get install -y ffmpeg libegl1

      - name: Install Python dependencies
        run: |
          python -m pip install -U pip
          pip install ruff pytest
          pip install -r requirements.txt

      - name: Lint (ruff) — hard gate
        run: ruff check --output-format=github .

      - name: Smoke tests (headless)
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest tests/smoke -q
